<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urbex - Accès Restreint</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="scanlines"></div>
    
    <div class="login-container">
        <h1 class="glitch" data-text="ACCÈS INTERDIT">ACCÈS INTERDIT</h1>
        <p class="status">État du site : Abandonné / Sécurisé</p>

        <form action="#" class="login-form">
            <div class="input-wrapper">
                <input type="password" placeholder="CLÉ D'ACCÈS" required>
                <div class="input-border"></div>
            </div>
            
            <button type="submit" class="btn-infiltrate">
                <span class="text">S'INFILTRER</span>
                <span class="flicker"></span>
            </button>
        </form>
        
        <div class="warning-footer">
            ATTENTION : Propriété privée. Risque d'effondrement.
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
