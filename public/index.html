<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MapsForUrbex - Command Center</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="sos-screen" class="sos-overlay"></div>
    <div id="stealth-screen" style="display:none;"></div>

    <div class="top-bar">
        <div class="status-badge" id="status-text">👋 Sélectionne un outil</div>
        <button class="btn-radar-toggle" onclick="toggleRadar()">📡 Radar <span>🔽</span></button>
    </div>

    <div class="radar-panel hidden" id="radar-content">
        <label class="filter-label"><input type="checkbox" class="filter-cb" value="accessible" checked> 🟢 Accessibles</label>
        <label class="filter-label"><input type="checkbox" class="filter-cb" value="garde" checked> 🟠 Gardés / Risqués</label>
        <label class="filter-label"><input type="checkbox" class="filter-cb" value="dangereux" checked> 🔴 Dangereux</label>
        <label class="filter-label"><input type="checkbox" class="filter-cb" value="detruit" checked> ⚫ Détruits / Murés</label>
    </div>

    <div class="side-tools">
        <button id="btn-add" class="tool-btn" onclick="toggleTool('add')" title="Ajouter">📍</button>
        <button id="btn-edit" class="tool-btn" onclick="toggleTool('edit')" title="Modifier">✏️</button>
        <button id="btn-del" class="tool-btn" onclick="toggleTool('delete')" title="Supprimer">🗑️</button>
        <button id="btn-measure" class="tool-btn" onclick="toggleTool('measure')" title="Mesurer">📏</button>
    </div>

    <div id="layers-menu" class="action-panel hidden">
        <h4>Fonds de carte</h4>
        <div class="layer-grid">
            <button onclick="setMapStyle('classique')">🗺️ Classique</button>
            <button onclick="setMapStyle('satellite')">🛰️ Satellite</button>
            <button onclick="setMapStyle('topo')">⛰️ Topo</button>
            <button onclick="setMapStyle('nuit')">🦇 Nuit</button>
        </div>
    </div>

    <div id="radio-panel" class="action-panel hidden">
        <div class="radio-header" onclick="toggleRadio()">📻 Canal Équipe <span>⬇️</span></div>
        <div class="radio-messages" id="radio-messages"></div>
        <div class="radio-input-container">
            <input type="text" id="radio-input" placeholder="Message..." onkeypress="if(event.key === 'Enter') sendRadio()">
            <button onclick="sendRadio()">GO</button>
        </div>
    </div>

    <div class="bottom-dock">
        <button class="dock-btn" onclick="toggleLayersMenu()">
            <span class="dock-icon">🗺️</span><span class="dock-text">Cartes</span>
        </button>
        <button class="dock-btn" onclick="localiserMoi()">
            <span class="dock-icon">🎯</span><span class="dock-text">GPS</span>
        </button>
        <button class="dock-btn" onclick="toggleRadio()">
            <span class="dock-icon">📻</span><span class="dock-text">Radio</span>
        </button>
        <button class="dock-btn stealth-btn" onclick="toggleStealth()">
            <span class="dock-icon">🥷</span><span class="dock-text">Furtif</span>
        </button>
        <button class="dock-btn sos-btn" onclick="triggerSOS()">
            <span class="dock-icon">🚨</span><span class="dock-text">S.O.S</span>
        </button>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Nouveau Point Urbex</h3>
            <div class="input-group"><label>Nom du lieu</label><input type="text" id="point-name" required></div>
            <div class="input-group">
                <label>Statut</label>
                <select id="point-status">
                    <option value="accessible">🟢 Accessible / Ouvert</option>
                    <option value="garde">🟠 Gardé / Caméras</option>
                    <option value="dangereux">🔴 Dangereux / Ruine</option>
                    <option value="detruit">⚫ Détruit / Muré</option>
                </select>
            </div>
            <div class="input-group"><label>Date (optionnel)</label><input type="date" id="point-date"></div>
            <div class="input-group">
                <label>Équipe</label><div id="people-list"><input type="text" class="person-input" placeholder="Personne 1"></div>
                <button type="button" class="btn-small" id="btn-add-person">+ Ajouter un membre</button>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel">Annuler</button>
                <button class="btn-confirm" id="btn-confirm">Valider</button>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
