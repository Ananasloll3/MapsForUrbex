<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MapsForUrbex - Command Center</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css" />
    
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body>
    <video id="nvg-camera" autoplay playsinline class="hidden"></video>
    <div id="nvg-overlay" class="hidden">
        <div class="nvg-crosshair">+</div>
        <div class="nvg-text">NVG ACTIVE - REC 🔴</div>
        <button class="nvg-close" onclick="toggleNVG()">✖ FERMER NVG</button>
    </div>

    <div id="fake-ui" class="hidden">
        <div class="fake-header" ondblclick="disablePanic()">🏞️ RandoCartes - Sentiers Publics</div>
    </div>

    <div id="sos-screen" class="sos-overlay"></div>
    <div id="stealth-screen" style="display:none;"></div>
    <div id="offline-banner" class="offline-banner hidden">⚠️ ZONE BLANCHE : Signal Perdu. S.O.S et Radio inactifs !</div>

    <div class="main-interface">
        <div id="map"></div>

        <div class="controls-panel">
            <button id="btn-measure" class="btn-tool" title="Mesurer distance">📏</button>
            <button id="btn-nvg" class="btn-tool" onclick="toggleNVG()" title="Vision Nocturne">🌙 NVG</button>
            
            <button id="btn-doc" class="btn-tool" onclick="window.location.href='/doc'" title="Documentation" style="background: rgba(52, 152, 219, 0.3); border: 1px solid #3498db; color: #3498db; font-weight: bold;">
                📖 DOC
            </button>
            
            <button id="btn-sos" class="btn-sos" onclick="triggerSOS()">🚨 S.O.S</button>
        </div>

        <div class="layers-panel">
            <button onclick="changeMapStyle('classique')">Classique</button>
            <button onclick="changeMapStyle('satellite')">Satellite</button>
            <button onclick="changeMapStyle('sombre')">Sombre</button>
            <button onclick="changeMapStyle('topo')">Topo</button>
        </div>

        <div class="chat-panel" id="chat-panel">
            <div class="chat-header">📡 RADIO ESCUADRA</div>
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Message radio...">
                <button id="btn-send-chat">OK</button>
            </div>
        </div>

        <div class="radar-panel" id="radar-panel">
            <div class="radar-header">🛰️ RADAR TACTIQUE</div>
            <div id="radar-content"></div>
        </div>
    </div>

    <div id="modal-point" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Nouveau Rapport de Spot</h3>
            
            <div class="input-group">
                <label>Nom du Site</label>
                <input type="text" id="point-name" placeholder="Ex: Usine Désaffectée">
            </div>

            <div class="input-group-row">
                <div style="flex:1;">
                    <label>Catégorie</label>
                    <select id="point-category"></select>
                </div>
                <div style="flex:1;">
                    <label>Niveau de Risque</label>
                    <select id="point-risk">
                        <option value="Faible">🟢 Faible</option>
                        <option value="Moyen">🟡 Moyen</option>
                        <option value="Élevé">🟠 Élevé</option>
                        <option value="Critique">🔴 CRITIQUE</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>État / Année / Infos</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="point-state" placeholder="État (ex: Ruine)" style="width:30%;">
                    <input type="number" id="point-year" placeholder="Année" style="width:25%;">
                    <input type="text" id="point-notes" placeholder="Notes tactiques..." style="flex:1;">
                </div>
            </div>

            <div class="input-group">
                <label>Équipe d'Exploration</label>
                <div id="people-list">
                    <input type="text" class="person-input" placeholder="Agent 1">
                </div>
                <button type="button" class="btn-small" id="btn-add-person">+ Ajouter un agent</button>
            </div>

            <div class="input-group">
                <label>📸 Preuve Visuelle</label>
                <input type="file" id="point-photo" accept="image/*" capture="environment">
                <img id="photo-preview" style="display:none; width: 100%; border-radius: 8px; margin-top: 5px;">
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" id="btn-cancel">ANNULER</button>
                <button class="btn-confirm" id="btn-confirm">TRANSMETTRE</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
